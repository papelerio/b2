<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Reader - Manual Control</title>
    <style>
        :root { --matrix-green: #00ff41; --dark-green: #003b00; --bg: #050505; }
        body { 
            font-family: 'Consolas', monospace; background: var(--bg); color: var(--matrix-green); 
            display: flex; justify-content: center; padding: 20px; margin: 0;
        }
        .container { 
            background: #0a0a0a; border: 1px solid var(--matrix-green); padding: 25px; 
            border-radius: 12px; width: 100%; max-width: 900px; box-shadow: 0 0 25px rgba(0, 255, 65, 0.2); 
        }
        
        .controls-top { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { 
            padding: 15px; border: 1px solid var(--matrix-green); background: transparent; color: var(--matrix-green); 
            font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        button:hover { background: var(--matrix-green); color: black; box-shadow: 0 0 10px var(--matrix-green); }

        /* EDITOR */
        #display-area { 
            width: 100%; height: 400px; background: #000; border: 1px solid var(--dark-green); 
            padding: 20px; border-radius: 4px; font-size: 22px; line-height: 1.6; overflow-y: auto;
            outline: none; white-space: pre-wrap; color: #555;
        }

        /* RESALTADO */
        .block-active { 
            color: var(--matrix-green); 
            background: rgba(0, 255, 65, 0.1);
            text-shadow: 0 0 5px var(--matrix-green);
            border-left: 4px solid var(--matrix-green);
        }

        .settings { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; margin-top: 20px; }
        input[type="range"] { accent-color: var(--matrix-green); width: 100%; cursor: pointer; }
        select { background: #000; color: var(--matrix-green); border: 1px solid var(--dark-green); padding: 8px; width: 100%; }
        label { font-size: 11px; opacity: 0.7; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls-top">
        <button id="btn-all">⚡ REPRODUCIR TODO</button>
        <button id="btn-resume">⏯ PLAY / PAUSA</button>
        <button id="btn-stop" style="color:#f44; border-color:#f44;">⏹ DETENER</button>
    </div>

    <div id="display-area" contenteditable="true">Escribe o pega tu texto aquí. 

1. Haz clic en cualquier oración para marcarla (verás un cambio leve).
2. Usa el botón o la BARRA ESPACIADORA (fuera del editor) para iniciar.
3. El sistema hará scroll automáticamente a cada nueva línea.</div>

    <div class="settings">
        <div>
            <label>VOZ:</label>
            <select id="voice-list"></select>
        </div>
        <div>
            <label>PITCH: <span id="p-val">1.0</span></label>
            <input type="range" id="pitch" min="0.1" max="2.0" step="0.1" value="1.0">
        </div>
        <div>
            <label>VELOCIDAD: <span id="r-val">1.0</span></label>
            <input type="range" id="rate" min="0.2" max="6.0" step="0.1" value="1.0">
        </div>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    const display = document.getElementById('display-area');
    const voiceSelect = document.getElementById('voice-list');
    
    let blocks = [];
    let currentIndex = 0;
    let isPlaying = false;

    function loadVoices() {
        voiceSelect.innerHTML = synth.getVoices().map(v => 
            `<option value="${v.name}" ${v.lang.includes('es') ? 'selected' : ''}>${v.name}</option>`
        ).join('');
    }
    synth.onvoiceschanged = loadVoices;
    loadVoices();

    // Divide el texto y permite seleccionar visualmente sin reproducir
    function prepareBlocks() {
        const rawText = display.innerText;
        const sentences = rawText.split(/(?<=[.!?])|\n/g).filter(s => s.trim().length > 0);
        
        display.innerHTML = '';
        blocks = sentences.map((text, idx) => {
            const span = document.createElement('span');
            span.textContent = text;
            span.style.display = "block"; 
            span.style.cursor = "pointer";
            
            span.onclick = (e) => {
                // Solo marcamos la posición, NO reproducimos
                currentIndex = idx;
                highlightCurrentOnly();
            };
            display.appendChild(span);
            return span;
        });
    }

    function highlightCurrentOnly() {
        blocks.forEach(b => b.classList.remove('block-active'));
        if(blocks[currentIndex]) {
            blocks[currentIndex].classList.add('block-active');
        }
    }

    function startReading() {
        if (currentIndex >= blocks.length) {
            isPlaying = false;
            return;
        }

        isPlaying = true;
        const currentSpan = blocks[currentIndex];
        highlightCurrentOnly();
        currentSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });

        const ut = new SpeechSynthesisUtterance(currentSpan.textContent);
        ut.voice = synth.getVoices().find(v => v.name === voiceSelect.value);
        ut.pitch = document.getElementById('pitch').value;
        ut.rate = document.getElementById('rate').value;

        ut.onend = () => {
            if (isPlaying) {
                currentIndex++;
                startReading();
            }
        };

        synth.speak(ut);
    }

    // BOTONES
    document.getElementById('btn-all').onclick = () => {
        prepareBlocks();
        currentIndex = 0;
        startReading();
    };

    document.getElementById('btn-resume').onclick = togglePlay;

    function togglePlay() {
        if (synth.paused) {
            synth.resume();
        } else if (synth.speaking) {
            isPlaying = false;
            synth.pause();
        } else {
            if (blocks.length === 0) prepareBlocks();
            startReading();
        }
    }

    document.getElementById('btn-stop').onclick = () => {
        isPlaying = false;
        synth.cancel();
        blocks.forEach(b => b.classList.remove('block-active'));
    };

    // BARRA ESPACIADORA (Inteligente)
    window.onkeydown = (e) => {
        if (e.code === "Space") {
            // Si el usuario NO está escribiendo en el editor, controlamos la voz
            if (document.activeElement !== display) {
                e.preventDefault();
                togglePlay();
            }
        }
    };

    // Live update al mover deslizadores
    [document.getElementById('pitch'), document.getElementById('rate'), voiceSelect].forEach(el => {
        el.oninput = () => {
            document.getElementById('p-val').textContent = document.getElementById('pitch').value;
            document.getElementById('r-val').textContent = document.getElementById('rate').value;
            if (synth.speaking && !synth.paused) {
                startReading(); // Reinicia el bloque actual con los nuevos valores
            }
        };
    });

</script>
</body>
</html>
